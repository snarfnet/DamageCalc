name: Take Screenshots & Upload to ASC

on:
  workflow_dispatch:

jobs:
  screenshots:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4

    - name: Select Xcode
      run: |
        XCODE_APP=$(ls /Applications/ | grep -E "^Xcode_2[6-9]|^Xcode_[3-9][0-9]" | sort -V | tail -1)
        if [ -n "$XCODE_APP" ]; then
          sudo xcode-select -s "/Applications/$XCODE_APP"
        else
          XCODE_APP=$(ls /Applications/ | grep "^Xcode_" | sort -V | tail -1)
          sudo xcode-select -s "/Applications/$XCODE_APP"
        fi
        xcodebuild -version

    - name: Install XcodeGen
      run: brew install xcodegen

    - name: Generate Xcode project
      run: xcodegen generate

    - name: Find Simulators
      run: |
        IPHONE_ID=$(xcrun simctl list devices available | grep "iPhone 16 Pro Max" | head -1 | grep -oE '[A-F0-9-]{36}')
        if [ -z "$IPHONE_ID" ]; then
          IPHONE_ID=$(xcrun simctl list devices available | grep "iPhone" | grep "Pro Max" | head -1 | grep -oE '[A-F0-9-]{36}')
        fi
        IPAD_ID=$(xcrun simctl list devices available | grep "iPad Pro" | grep "13" | head -1 | grep -oE '[A-F0-9-]{36}')
        if [ -z "$IPAD_ID" ]; then
          IPAD_ID=$(xcrun simctl list devices available | grep "iPad Pro" | grep "12.9" | head -1 | grep -oE '[A-F0-9-]{36}')
        fi
        if [ -z "$IPAD_ID" ]; then
          IPAD_ID=$(xcrun simctl list devices available | grep "iPad" | head -1 | grep -oE '[A-F0-9-]{36}')
        fi
        echo "IPHONE_ID=$IPHONE_ID" >> $GITHUB_ENV
        echo "IPAD_ID=$IPAD_ID" >> $GITHUB_ENV
        echo "iPhone: $IPHONE_ID / iPad: $IPAD_ID"

    - name: Build for iPhone Simulator
      run: |
        xcodebuild build \
          -scheme DamageCalc \
          -configuration Debug \
          -destination "id=$IPHONE_ID" \
          -derivedDataPath build/DerivedData \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO

    - name: Take iPhone Screenshot
      run: |
        xcrun simctl boot "$IPHONE_ID" || true
        xcrun simctl bootstatus "$IPHONE_ID" -b
        APP_PATH=$(find build/DerivedData -name "DamageCalc.app" -type d | head -1)
        xcrun simctl install "$IPHONE_ID" "$APP_PATH"
        xcrun simctl launch "$IPHONE_ID" com.tokyonasu.damagecalc SCREENSHOT_MODE
        sleep 12
        mkdir -p screenshots
        xcrun simctl io "$IPHONE_ID" screenshot screenshots/iphone_67.png
        xcrun simctl shutdown "$IPHONE_ID" || true

    - name: Build for iPad Simulator
      run: |
        xcodebuild build \
          -scheme DamageCalc \
          -configuration Debug \
          -destination "id=$IPAD_ID" \
          -derivedDataPath build/DerivedDataiPad \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO \
          | xcpretty || true

    - name: Take iPad Screenshot
      run: |
        xcrun simctl boot "$IPAD_ID" || true
        xcrun simctl bootstatus "$IPAD_ID" -b
        APP_PATH=$(find build/DerivedDataiPad -name "DamageCalc.app" -type d | head -1)
        if [ -z "$APP_PATH" ]; then
          APP_PATH=$(find build/DerivedData -name "DamageCalc.app" -type d | head -1)
        fi
        xcrun simctl install "$IPAD_ID" "$APP_PATH"
        xcrun simctl launch "$IPAD_ID" com.tokyonasu.damagecalc SCREENSHOT_MODE
        sleep 12
        xcrun simctl io "$IPAD_ID" screenshot screenshots/ipad_129.png

    - name: Upload screenshots artifact
      uses: actions/upload-artifact@v4
      with:
        name: screenshots
        path: screenshots/

    - name: Upload to App Store Connect
      env:
        ASC_KEY_P8: ${{ secrets.ASC_KEY_P8 }}
      run: |
        echo "$ASC_KEY_P8" > /tmp/asc_key.p8
        pip install PyJWT requests cryptography
        python scripts/upload_screenshots.py screenshots
        rm /tmp/asc_key.p8
