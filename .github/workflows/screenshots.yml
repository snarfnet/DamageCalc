name: Take Screenshots & Upload to ASC

on:
  workflow_dispatch:

jobs:
  screenshots:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4

    - name: Select Xcode
      run: |
        XCODE_APP=$(ls /Applications/ | grep -E "^Xcode_2[6-9]|^Xcode_[3-9][0-9]" | sort -V | tail -1)
        if [ -n "$XCODE_APP" ]; then
          sudo xcode-select -s "/Applications/$XCODE_APP"
        else
          XCODE_APP=$(ls /Applications/ | grep "^Xcode_" | sort -V | tail -1)
          sudo xcode-select -s "/Applications/$XCODE_APP"
        fi
        xcodebuild -version

    - name: Install XcodeGen
      run: brew install xcodegen

    - name: Generate Xcode project
      run: xcodegen generate

    - name: Build for iPhone Simulator
      run: |
        xcodebuild build \
          -scheme DamageCalc \
          -configuration Debug \
          -destination "platform=iOS Simulator,name=iPhone 16 Pro Max" \
          -derivedDataPath build/DerivedData \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO

    - name: Boot iPhone Simulator & Take Screenshot
      run: |
        UDID=$(xcrun simctl list devices available | grep "iPhone 16 Pro Max" | head -1 | grep -E -o '\([A-F0-9-]{36}\)' | tr -d '()')
        if [ -z "$UDID" ]; then
          UDID=$(xcrun simctl list devices available | grep "iPhone" | grep "Pro Max" | head -1 | grep -E -o '\([A-F0-9-]{36}\)' | tr -d '()')
        fi
        echo "IPHONE_UDID=$UDID" >> $GITHUB_ENV
        xcrun simctl boot "$UDID" || true
        xcrun simctl bootstatus "$UDID" -b
        APP_PATH=$(find build/DerivedData -name "DamageCalc.app" -type d | head -1)
        xcrun simctl install "$UDID" "$APP_PATH"
        xcrun simctl launch "$UDID" com.tokyonasu.damagecalc SCREENSHOT_MODE
        sleep 12
        mkdir -p screenshots
        xcrun simctl io "$UDID" screenshot screenshots/iphone_67.png
        xcrun simctl shutdown "$UDID" || true

    - name: Build for iPad Simulator
      run: |
        IPAD_DEST=$(xcrun simctl list devices available | grep -i "iPad Pro" | grep -i "13" | head -1 | sed 's/(.*//' | xargs)
        if [ -z "$IPAD_DEST" ]; then
          IPAD_DEST="iPad Air 13-inch (M2)"
        fi
        echo "Building for: $IPAD_DEST"
        xcodebuild build \
          -scheme DamageCalc \
          -configuration Debug \
          -destination "platform=iOS Simulator,name=$IPAD_DEST" \
          -derivedDataPath build/DerivedDataiPad \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO

    - name: Boot iPad Simulator & Take Screenshot
      run: |
        UDID=$(xcrun simctl list devices available | grep -i "iPad Pro" | grep -i "13" | head -1 | grep -E -o '\([A-F0-9-]{36}\)' | tr -d '()')
        if [ -z "$UDID" ]; then
          UDID=$(xcrun simctl list devices available | grep -i "iPad Air" | grep -i "13" | head -1 | grep -E -o '\([A-F0-9-]{36}\)' | tr -d '()')
        fi
        if [ -z "$UDID" ]; then
          UDID=$(xcrun simctl list devices available | grep -i "iPad" | tail -1 | grep -E -o '\([A-F0-9-]{36}\)' | tr -d '()')
        fi
        echo "IPAD_UDID=$UDID"
        xcrun simctl boot "$UDID" || true
        xcrun simctl bootstatus "$UDID" -b
        APP_PATH=$(find build/DerivedDataiPad -name "DamageCalc.app" -type d | head -1)
        if [ -z "$APP_PATH" ]; then
          APP_PATH=$(find build/DerivedData -name "DamageCalc.app" -type d | head -1)
        fi
        xcrun simctl install "$UDID" "$APP_PATH"
        xcrun simctl launch "$UDID" com.tokyonasu.damagecalc SCREENSHOT_MODE
        sleep 12
        xcrun simctl io "$UDID" screenshot screenshots/ipad_129.png

    - name: Upload screenshots artifact
      uses: actions/upload-artifact@v4
      with:
        name: screenshots
        path: screenshots/

    - name: Upload to App Store Connect
      env:
        ASC_KEY_P8: ${{ secrets.ASC_KEY_P8 }}
      run: |
        echo "$ASC_KEY_P8" > /tmp/asc_key.p8
        pip install PyJWT requests cryptography
        python scripts/upload_screenshots.py screenshots
        rm /tmp/asc_key.p8
